services:
  - type: web
    name: notes-app-abhinay
    runtime: java
    plan: free
    buildCommand: ./mvnw -q -DskipTests package
    startCommand: java -jar target/notes-app-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
