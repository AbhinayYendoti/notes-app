<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOTES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Manrope:wght@400;700;800&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
  <style>
    :root{--color-primary:#000;--color-canvas:#fff;--color-canvas-soft:#f5f5f5;--color-hairline:#e0e0e0;--color-ink:#000;--color-ink-soft:#1a1a1a;--color-body:#757575;--color-link:#057dbc;--color-on-primary:#fff;--font-display:'Playfair Display',Georgia,serif;--font-body:'Lora',Georgia,serif;--font-sans:'Manrope',Arial,sans-serif;--border-hairline:1px solid var(--color-hairline);--border-ink:1px solid var(--color-ink);--container-max:1400px}
    *{box-sizing:border-box}body{margin:0;background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);font-size:17px}button,input,textarea{font:inherit;border-radius:0}button{cursor:pointer;text-transform:uppercase;font-weight:800;letter-spacing:.3px}.masthead{border-bottom:var(--border-hairline);padding:12px 20px;text-align:center;font-family:var(--font-display);font-size:28px}.nav{border-bottom:var(--border-hairline);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;font-size:14px;font-weight:800}.container{max-width:var(--container-max);margin:0 auto;padding:32px 20px}.button-primary{background:var(--color-primary);color:var(--color-on-primary);border:0;padding:12px 20px}.button-outline{background:var(--color-canvas);color:var(--color-ink);border:var(--border-ink);padding:12px 20px}.button-text{background:transparent;border:0;color:var(--color-ink-soft);padding:8px}.button-icon{width:38px;height:38px;border:var(--border-ink);background:var(--color-canvas);border-radius:9999px;padding:0}.button-primary:hover,.button-outline:hover,.button-icon:hover,.story:hover,.row:hover{background:var(--color-canvas-soft);color:var(--color-ink)}.button-primary:hover{background:#1a1a1a;color:#fff}.auth-card{max-width:460px;margin:44px auto;border:var(--border-hairline);padding:24px}.tabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:20px}.tabs button.active{background:#000;color:#fff}.field{display:grid;gap:8px;margin-bottom:16px}label,.eyebrow{font-size:12px;font-weight:800;text-transform:uppercase}.input{width:100%;border:var(--border-ink);padding:12px 16px;background:#fff}.input:focus{outline:0;border:2px solid #000}.error{min-height:22px;color:var(--color-ink-soft);font-size:14px}.hero{display:flex;align-items:end;justify-content:space-between;gap:20px;border-bottom:var(--border-hairline);padding-bottom:24px}.hero h1,.article h1{font-family:var(--font-display);font-size:64px;font-weight:400;line-height:1;margin:0}.grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:24px;margin-top:24px}.story{padding:16px;min-height:180px;border-bottom:var(--border-hairline)}.story.large{min-height:280px}.story h2{font-family:var(--font-display);font-size:32px;font-weight:400;margin:12px 0}.story h3{font-family:var(--font-display);font-size:26px;font-weight:400;margin:12px 0}.meta{font-family:var(--font-body);font-size:12.73px;font-weight:700;line-height:2.2;color:var(--color-body)}.pin{display:inline-block;background:#000;color:#fff;font-size:10px;font-weight:800;padding:2px 5px;margin-left:8px}.rows{margin-top:24px}.row{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;border-bottom:var(--border-hairline);padding:16px 0}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.article{max-width:720px;margin:0 auto}.article input.title{font-family:var(--font-display);font-size:32px;border:0;border-bottom:var(--border-hairline);padding:12px 0}.article textarea{min-height:260px;font-family:var(--font-body);line-height:1.5;border:0;border-bottom:var(--border-hairline);padding:12px 0;resize:vertical}.divider{border:0;border-top:var(--border-hairline);margin:20px 0}.body{font-family:var(--font-body);font-size:16px;line-height:1.6;white-space:pre-wrap}.history{border-top:var(--border-hairline);margin-top:24px;padding-top:20px}.history-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.version{border-bottom:var(--border-hairline);padding:14px 0}.version-title{display:flex;align-items:center;justify-content:space-between;gap:12px}.version-preview{font-family:var(--font-body);font-size:15px;line-height:1.5;white-space:pre-wrap;margin:8px 0 0}.empty{text-align:center;border-bottom:var(--border-hairline);padding:48px 0}.footer{margin-top:48px;background:#000;color:#fff;padding:48px 20px;font-size:14px}.footer-inner{max-width:var(--container-max);margin:auto;display:grid;gap:20px}.hidden{display:none}.search{max-width:360px}.search input{border:var(--border-ink);padding:10px;width:100%}@media(max-width:767px){.hero{display:block}.hero h1,.article h1{font-size:40px}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.nav{gap:12px}.actions,.version-title,.history-head{justify-content:flex-start;align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <div class="masthead">NOTES</div>
  <nav class="nav"><button class="button-text" id="backBtn">BACK</button><span id="navLabel">NOTES</span><button class="button-primary" id="navAction">NEW NOTE</button></nav>
  <main id="app"></main>
  <footer class="footer"><div class="footer-inner"><strong>NOTES</strong><span>Private notes, shared carefully.</span></div></footer>
  <script>
    const API_BASE = localStorage.getItem('notes_api_base') || 'http://localhost:8081';
    const state = { token:null,user:null,notes:[],currentNote:null,history:[],selectedVersion:null,historyOpen:false,view:'auth',mode:'login',error:null,query:'' };
    const $ = id => document.getElementById(id);
    const esc = s => String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const created = n => n.created_at || n.createdAt;
    const updated = n => n.updated_at || n.updatedAt;
    const saved = v => v.saved_at || v.savedAt;
    const api = async (method,path,body=null) => {
      const headers = {'Content-Type':'application/json'};
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const res = await fetch(`${API_BASE}${path}`,{method,headers,body:body?JSON.stringify(body):null});
      if (!res.ok) throw new Error((await res.json().catch(()=>({message:'Request failed'}))).message || 'Request failed');
      return res.status === 204 ? null : res.json();
    };
    const sortNotes = notes => [...notes].sort((a,b)=>(b.pinned-a.pinned)||new Date(created(b))-new Date(created(a)));
    const setError = e => { state.error = e.message || String(e); render(); };
    const go = hash => { location.hash = hash; };
    const loadNotes = async () => { state.notes = sortNotes(await api('GET', state.query ? `/search?q=${encodeURIComponent(state.query)}` : '/notes')); };
    const loadHistory = async id => { state.history = await api('GET', `/notes/${id}/history`); state.historyOpen = true; };
    function chrome(){
      $('backBtn').classList.toggle('hidden', state.view === 'auth' || state.view === 'dashboard');
      $('navAction').classList.toggle('hidden', state.view === 'auth');
      $('navAction').textContent = state.view === 'editor' ? 'SAVE' : 'NEW NOTE';
      $('navLabel').textContent = state.user ? state.user.email : 'NOTES';
    }
    function authView(){
      return `<section class="container"><div class="auth-card"><div class="tabs"><button class="button-outline ${state.mode==='login'?'active':''}" data-mode="login">Sign In</button><button class="button-outline ${state.mode==='register'?'active':''}" data-mode="register">Register</button></div><form id="authForm"><div class="field"><label>Email</label><input class="input" name="email" type="email" required></div><div class="field"><label>Password</label><input class="input" name="password" type="password" required></div><button class="button-primary">${state.mode==='login'?'SIGN IN':'CREATE ACCOUNT'}</button><div class="error">${esc(state.error)}</div></form></div></section>`;
    }
    function dashboardView(){
      const [first,...rest] = state.notes, top = rest.slice(0,2), rows = rest.slice(2);
      return `<section class="container"><div class="hero"><h1>YOUR NOTES</h1><div class="search"><input id="searchInput" placeholder="Search" value="${esc(state.query)}"></div></div>${state.notes.length?`<div class="grid">${story(first,true)}${top.map(n=>story(n,false)).join('')}</div><div class="rows">${rows.map(row).join('')}</div>`:`<div class="empty"><p class="meta">No notes yet.</p><button class="button-primary" data-new>CREATE FIRST NOTE</button></div>`}</section>`;
    }
    const story = (n,large) => n ? `<article class="story ${large?'large':''}" data-open="${n.id}"><span class="eyebrow">NOTE ${n.pinned?'<span class="pin">PINNED</span>':''}</span><${large?'h2':'h3'}>${esc(n.title)}</${large?'h2':'h3'}><p class="meta">${fmt(updated(n))}</p><p>${esc(short(n.content))}</p></article>` : '<article class="story"></article>';
    const row = n => `<div class="row"><div data-open="${n.id}"><strong>${esc(n.title)}</strong>${n.pinned?'<span class="pin">PINNED</span>':''}<div class="meta">${fmt(updated(n))}</div></div><div class="actions"><button class="button-outline" data-edit="${n.id}">EDIT</button><button class="button-icon" title="Share" data-share="${n.id}">S</button><button class="button-text" data-delete="${n.id}">Delete</button></div></div>`;
    function editorView(){
      const n = state.currentNote || {};
      return `<section class="container"><form class="article" id="noteForm"><span class="eyebrow">${n.id?'EDITING':'NEW NOTE'}</span><div class="field"><input class="input title" name="title" placeholder="Title" value="${esc(n.title)}" required maxlength="255"></div><div class="field"><textarea class="input" name="content" placeholder="Content" required maxlength="50000">${esc(n.content)}</textarea></div><div class="meta">Last saved: ${updated(n)?fmt(updated(n)):'Not saved'}</div><div class="error">${esc(state.error)}</div></form></section>`;
    }
    function detailView(){
      const n = state.currentNote;
      if(!n) return '<section class="container"><div class="empty">Note not found.</div></section>';
      return `<section class="container article"><span class="eyebrow">NOTE ${n.pinned?'<span class="pin">PINNED</span>':''}</span><h1>${esc(n.title)}</h1><div class="meta">${fmt(created(n))}</div><hr class="divider"><div class="body">${esc(n.content)}</div><hr class="divider"><div class="actions"><button class="button-outline" data-edit="${n.id}">EDIT</button><button class="button-outline" data-pin="${n.id}">${n.pinned?'UNPIN':'PIN NOTE'}</button><button class="button-outline" data-history="${n.id}">${state.historyOpen?'REFRESH HISTORY':'HISTORY'}</button><button class="button-icon" title="Share" data-share="${n.id}">S</button><button class="button-text" data-delete="${n.id}">Delete note</button></div>${historyView(n)}<div class="error">${esc(state.error)}</div></section>`;
    }
    function historyView(note){
      if(!state.historyOpen) return '';
      const versions = state.history.length ? state.history.map(versionRow).join('') : '<div class="version"><p class="meta">No previous versions.</p></div>';
      return `<section class="history"><div class="history-head"><span class="eyebrow">VERSION HISTORY</span><button class="button-text" data-close-history>CLOSE</button></div>${versions}</section>`;
    }
    function versionRow(v){
      const selected = state.selectedVersion && state.selectedVersion.id === v.id ? `<p class="version-preview">${esc(state.selectedVersion.content)}</p>` : '';
      return `<article class="version"><div class="version-title"><div><strong>Version ${v.versionNumber}</strong><div class="meta">${fmt(saved(v))}</div></div><div class="actions"><button class="button-outline" data-version="${v.id}">VIEW</button><button class="button-primary" data-restore="${v.id}">RESTORE</button></div></div><p class="version-preview">${esc(short(v.content))}</p>${selected}</article>`;
    }
    function render(){
      chrome();
      $('app').innerHTML = state.view==='auth'?authView():state.view==='dashboard'?dashboardView():state.view==='editor'?editorView():detailView();
      bind();
    }
    function bind(){
      document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.error=null;render();});
      document.querySelectorAll('[data-open]').forEach(e=>e.onclick=()=>go(`note/${e.dataset.open}`));
      document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();go(`edit/${b.dataset.edit}`);});
      document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async e=>{e.stopPropagation();try{await api('DELETE',`/notes/${b.dataset.delete}`);await loadNotes();go('dashboard')}catch(err){setError(err)}});
      document.querySelectorAll('[data-pin]').forEach(b=>b.onclick=async()=>{try{await api('PATCH',`/notes/${b.dataset.pin}/pin`);await route()}catch(err){setError(err)}});
      document.querySelectorAll('[data-history]').forEach(b=>b.onclick=async()=>{try{await loadHistory(b.dataset.history);state.selectedVersion=null;render()}catch(err){setError(err)}});
      document.querySelectorAll('[data-version]').forEach(b=>b.onclick=async()=>{try{state.selectedVersion=await api('GET',`/notes/${state.currentNote.id}/history/${b.dataset.version}`);render()}catch(err){setError(err)}});
      document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=async()=>{if(!confirm('Restore this version?'))return;try{state.currentNote=await api('POST',`/notes/${state.currentNote.id}/history/${b.dataset.restore}/restore`);await loadNotes();await loadHistory(state.currentNote.id);state.selectedVersion=null;render()}catch(err){setError(err)}});
      document.querySelectorAll('[data-close-history]').forEach(b=>b.onclick=()=>{state.historyOpen=false;state.selectedVersion=null;render();});
      document.querySelectorAll('[data-share]').forEach(b=>b.onclick=async e=>{e.stopPropagation();const email=prompt('Share with email');if(!email)return;try{await api('POST',`/notes/${b.dataset.share}/share`,{share_with_email:email});state.error='';}catch(err){setError(err)}});
      const auth = $('authForm'); if(auth) auth.onsubmit = submitAuth;
      const form = $('noteForm'); if(form) form.onsubmit = submitNote;
      const search = $('searchInput'); if(search) search.onchange = async()=>{state.query=search.value.trim();try{await loadNotes();render()}catch(err){setError(err)}};
      document.querySelectorAll('[data-new]').forEach(b=>b.onclick=()=>go('new'));
    }
    async function submitAuth(e){e.preventDefault();const f=new FormData(e.target);try{const body={email:f.get('email'),password:f.get('password')};if(state.mode==='register')await api('POST','/register',body);const r=await api('POST','/login',body);state.token=r.access_token;state.user={email:body.email.trim().toLowerCase()};state.error=null;await loadNotes();go('dashboard')}catch(err){setError(err)}}
    async function submitNote(e){e.preventDefault();const f=new FormData(e.target), body={title:f.get('title'),content:f.get('content')};try{if(state.currentNote?.id)state.currentNote=await api('PUT',`/notes/${state.currentNote.id}`,body);else state.currentNote=await api('POST','/notes',body);await loadNotes();go(`note/${state.currentNote.id}`)}catch(err){setError(err)}}
    async function route(){try{state.error=null;state.historyOpen=false;state.selectedVersion=null;const [kind,id]=(location.hash.slice(1)||'auth').split('/');if(!state.token&&kind!=='auth'){state.view='auth';return render()}if(kind==='dashboard'){state.view='dashboard';await loadNotes()}else if(kind==='new'){state.view='editor';state.currentNote=null}else if(kind==='edit'){state.view='editor';state.currentNote=await api('GET',`/notes/${id}`)}else if(kind==='note'){state.view='detail';state.currentNote=await api('GET',`/notes/${id}`)}else state.view='auth';render()}catch(err){setError(err)}}
    function short(s){return s && s.length>140 ? `${s.slice(0,140)}...` : s || ''} function fmt(s){return s?new Date(s).toLocaleString():'Never'}
    $('navAction').onclick=()=> state.view==='editor' ? $('noteForm').requestSubmit() : go('new');
    $('backBtn').onclick=()=> state.view==='detail'||state.view==='editor' ? go('dashboard') : history.back();
    addEventListener('hashchange',route); route();
  </script>
</body>
</html>
